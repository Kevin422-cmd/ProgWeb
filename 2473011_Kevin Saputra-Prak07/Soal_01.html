<html>
<head>
    <title>2473011-Kevin Saputra</title>
    <script type="text/javascript">
            function call_onKeyPress(ob) {
            var obval = ob.value;
            if (obval.length > 256) {
                ob.value = obval.substr(0, 256);
                obval = ob.value; 
            }
            document.getElementById("txt2").value = obval.length + "/256";
        }
    </script>
</head>
<body>
    <form>
        <table>
            <tr>
                <td>Judul</td>
                <td>: <input type="text" name="judul"></td>
            </tr>
            <tr>
                <td valign="top">Deskripsi</td>
                <td>: 
                    <textarea name="deskripsi" onkeyup="call_onKeyPress(this)" onkeydown="call_onKeyPress(this)" rows="5" cols="30"></textarea>
                </td>
            </tr>
            <tr>
                <td></td>
                <td align="right">
                    <input type="text" id="txt2" value="0/256" readonly style="width: 50px; text-align: right;">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
