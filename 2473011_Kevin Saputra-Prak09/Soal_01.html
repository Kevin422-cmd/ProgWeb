<html>
<head>
    <title>2473011_KevinSaputra</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {
            $("li.item ol").hide();

            $("li.item").hover(
                function () {
                   
                    $(this).children("ol").show();
                },
                function () {
                   
                    $(this).children("ol").hide();
                }
            );
        });
    </script>

    <style>
        .list {
            list-style: none;
            padding: 0;
            margin: 20px;
        }
        .item {
            display: inline-block;
            position: relative;
            background-color: #ff1493; 
            color: white;
            padding: 5px 10px;
            margin-right: 5px;
            cursor: pointer;
            min-width: 120px;
            font-family: sans-serif;
            vertical-align: top;
        }
        .item ol {
            position: absolute;
            top: 100%;
            left: 0;
            background-color: white;
            border: 3px solid #ff1493;
            list-style: none; 
            padding: 5px 10px;
            margin: 0;
            min-width: 140px;
        }
        .item ol li {
            color: black; 
            text-decoration: underline; 
            padding: 3px 0;
            font-size: 14px;
        }
        .item ol li:hover {
            background: lightgray;;
        }
    </style>
</head>

<body>
    <ol class="list">
        <li class="item">jQuery
            <ol>
                <li>Download</li>
                <li>Documentation</li>
                <li>Blog</li>
            </ol>
        </li>
        <li class="item">Community
            <ol>
                <li>Mailing List</li>
                <li>Tutorials</li>
                <li>Demos</li>
                <li>Plugins</li>
            </ol>
        </li>
        <li class="item">Development
            <ol>
                <li>Source Code</li>
                <li>Bug Tracking</li>

            </ol>
        </li>
    </ol>
</body>
</html>
